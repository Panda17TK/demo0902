name: android-apk

# Android デバッグ APK をビルドして配布する。
# この実行環境からは Google の Android リポジトリが遮断されているためローカルでは
# ビルドできない。GitHub ホストランナー（Android SDK 同梱・フル回線）でビルドし、
# 成果物(artifact) と（成功時は）リリース資産として APK を配布する。
#
# 実行: Actions → "android-apk" → Run workflow（このブランチを選択）。
on:
  workflow_dispatch:

permissions:
  contents: write # リリース作成・APK 添付に必要

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-arena
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps & build web (www/)
        run: |
          npm install
          npm run build

      - name: Generate Android project (Capacitor)
        run: npx cap add android

      - name: Build debug APK
        working-directory: mobile-arena/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "$GITHUB_WORKSPACE/dist/wave-arena-v1.0.0-debug.apk"

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wave-arena-debug-apk
          path: dist/wave-arena-v1.0.0-debug.apk
          if-no-files-found: warn

      - name: Publish APK to GitHub Release (v1.0.0, prerelease)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: Wave Arena v1.0.0
          body_path: mobile-arena/RELEASE_NOTES.md
          prerelease: true
          files: dist/wave-arena-v1.0.0-debug.apk
