name: build

on:
  push:
    branches: [ main, "redesign/**" ]
    tags: [ "v*" ]
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v2.17.0). Creates the tag + Release on main and attaches the APK."
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # allow the v* release step to create a Release and upload the APK
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run core tests
        run: ./gradlew :core:test --no-daemon

      - name: Assemble debug APK
        run: ./gradlew :android:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arpg-debug-apk
          path: android/build/outputs/apk/debug/*.apk

      # Publish the APK to the Releases page (no login needed to download) either on a pushed v* tag,
      # or on a manual run (Actions → build → Run workflow → tag), which creates the tag + Release on main.
      - name: Resolve release tag
        id: rel
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          EVENT: ${{ github.event_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then tag="$DISPATCH_TAG"; else tag="$REF_NAME"; fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Rename APK for the release
        if: steps.rel.outputs.tag != ''
        run: |
          apk=$(ls android/build/outputs/apk/debug/*.apk | head -n1)
          cp "$apk" "arpg-${{ steps.rel.outputs.tag }}-debug.apk"

      - name: Publish APK to the Releases page
        if: steps.rel.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          target_commitish: main
          name: ${{ steps.rel.outputs.tag }}
          files: arpg-${{ steps.rel.outputs.tag }}-debug.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
