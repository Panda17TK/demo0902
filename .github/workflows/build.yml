name: build

on:
  push:
    branches: [ main, "redesign/**" ]
    tags: [ "v*" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # allow the release step to create a Release and upload the APK
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run core tests
        run: ./gradlew :core:test --no-daemon

      - name: Assemble debug APK
        run: ./gradlew :android:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arpg-debug-apk
          path: android/build/outputs/apk/debug/*.apk

      # One-off: publish the v2.16.0 debug APK to the Releases page from this branch (no tag push needed).
      - name: Rename APK for the release
        run: |
          apk=$(ls android/build/outputs/apk/debug/*.apk | head -n1)
          cp "$apk" "arpg-v2.16.0-debug.apk"

      - name: Publish APK to the Releases page
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.16.0
          target_commitish: main
          name: v2.16.0
          files: arpg-v2.16.0-debug.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
