name: deploy-pages

# mobile-arena（静的PWA）を GitHub Pages に公開する。
# 内容は feature ブランチにあるため、当該ブランチへの push で動かす。
# 事前準備（1回だけ・手動）: リポジトリ Settings → Pages → Source を「GitHub Actions」にする。
# もし github-pages 環境が既定ブランチに限定されている場合は
# Settings → Environments → github-pages → Deployment branches で当該ブランチを許可する。
on:
  push:
    branches: ["claude/mobile-arena-export-u36CG"]
    paths:
      - "mobile-arena/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-arena
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build static site (www/)
        run: npm run build
      - uses: actions/configure-pages@v5
      - name: Upload site artifact (mobile-arena/www)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "mobile-arena/www"
      - id: deployment
        uses: actions/deploy-pages@v4
